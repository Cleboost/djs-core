name: Changesets

on:
  push:
    branches:
      - master

concurrency:
  group: changesets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-or-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 25
          registry-url: "https://registry.npmjs.org"

      - run: bun i
      - run: |
          set -e
          cd packages/runtime
          PACK_FILE=$(bun pm pack --quiet | grep '\.tgz$' | tail -n 1)
          test -n "$PACK_FILE"
          echo "Publishing $PACK_FILE"
          npm publish "$PACK_FILE" --access public --provenance
      - uses: changesets/action@v1
        with:
          version: bun ci:version
          publish: bun ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
